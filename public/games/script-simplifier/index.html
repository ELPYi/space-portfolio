<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Script Simplifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    header p {
      margin-top: 8px;
      color: #64748b;
      font-size: 0.95rem;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .panel {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #cbd5e1;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }
    textarea::placeholder { color: #3f4660; }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    .btn-export { background: #0e7490; color: #fff; }
    .btn-export:hover:not(:disabled) { opacity: 0.88; }

    .btn-clear { background: #374151; color: #cbd5e1; }
    .btn-clear:hover { opacity: 0.8; }

    #output-area { display: none; }
    #output-area.visible {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .page-block {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-left: 4px solid #7c3aed;
      border-radius: 8px;
      padding: 16px 18px;
    }

    .page-title {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a78bfa;
      margin-bottom: 10px;
    }

    .page-lines { display: flex; flex-direction: column; gap: 4px; }

    .page-line {
      color: #e2e8f0;
      font-size: 0.95rem;
      line-height: 1.65;
    }

    #status-msg {
      font-size: 0.88rem;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }

    #status-msg.error {
      display: block;
      background: #3b1212;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }

    #status-msg.info {
      display: block;
      background: #0c2a2a;
      color: #5eead4;
      border: 1px solid #134e4a;
    }

    .summary { font-size: 0.82rem; color: #64748b; }
    .summary span { color: #a78bfa; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <h1>Script Simplifier</h1>
    <p>Paste your storybook script and extract the clean page text instantly.</p>
  </header>

  <div class="container">

    <div class="panel">
      <div class="panel-label">Input — Paste Your Script</div>
      <textarea id="input-text" placeholder="Paste your storybook script here...&#10;&#10;--- STORYBOOK SCRIPT ---&#10;Page 1: Front Cover&#10;Text: ...&#10;--- END SCRIPT ---"></textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="simplify()">Simplify</button>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div id="status-msg"></div>

    <div class="panel" id="output-panel" style="display:none;">
      <div class="panel-label">Output — Simplified Script</div>
      <div class="summary" id="summary"></div>
      <div id="output-area"></div>
      <div class="btn-row">
        <button class="btn-export" onclick="exportTxt()">Export as .txt</button>
      </div>
    </div>

  </div>

  <script>
    const RE_PAGE  = /^Page\s+(\d+)\s*:(.*)/i;
    const RE_TEXT  = /^Text[^:]*:\s*(.*)/i;
    const RE_LINE  = /^Line\s*\d+\s*:\s*(.*)/i;
    const RE_STOP  = /^(Image\s*:|Visual\s+Description\s*:|AI\s+Image\s+Prompt\s*:|Part\s+\d+\s*:|Character\s+Sheet\s*:|Marketing\s+Copy\s*:|Back\s+Cover\s*:|---)/i;
    const RE_BLOCK = /---+\s*STORYBOOK SCRIPT\s*---+\r?\n([\s\S]*?)\r?\n---+\s*END(?: SCRIPT)?\s*---+/i;

    function stripMarkdown(line) {
      return line
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\*(.+?)\*/g,     '$1')
        .replace(/__(.+?)__/g,     '$1')
        .replace(/^#{1,6}\s+/,     '');
    }

    function parse(raw) {
      const blockMatch = RE_BLOCK.exec(raw);
      const content = blockMatch ? blockMatch[1] : raw;

      const lines = content.split(/\r?\n/);
      const pages = [];
      let current = null;
      let collectingText = false;

      for (let rawLine of lines) {
        const line = stripMarkdown(rawLine.trim());
        if (!line) continue;

        const pageMatch = RE_PAGE.exec(line);
        if (pageMatch) {
          if (current) pages.push(current);
          current = { number: parseInt(pageMatch[1], 10), title: pageMatch[2].trim(), lines: [] };
          collectingText = false;
          continue;
        }

        if (!current) continue;

        if (RE_STOP.test(line)) { collectingText = false; continue; }

        const textMatch = RE_TEXT.exec(line);
        if (textMatch) {
          collectingText = true;
          const inline = textMatch[1].trim();
          if (inline) current.lines.push(inline);
          continue;
        }

        const lineMatch = RE_LINE.exec(line);
        if (lineMatch) {
          const text = lineMatch[1].trim();
          if (text) current.lines.push(text);
          continue;
        }

        if (collectingText) current.lines.push(line);
      }

      if (current) pages.push(current);
      return pages.filter(p => p.lines.length > 0);
    }

    function simplify() {
      const raw = document.getElementById('input-text').value.trim();
      const statusEl    = document.getElementById('status-msg');
      const outputPanel = document.getElementById('output-panel');
      const outputArea  = document.getElementById('output-area');
      const summary     = document.getElementById('summary');

      statusEl.className = '';
      statusEl.style.display = 'none';
      outputPanel.style.display = 'none';
      outputArea.innerHTML = '';
      outputArea.className = '';

      if (!raw) {
        statusEl.textContent = 'Please paste a script before clicking Simplify.';
        statusEl.className = 'error';
        return;
      }

      const pages = parse(raw);

      if (pages.length === 0) {
        statusEl.textContent = 'No pages with text were found. Make sure your script follows the expected format.';
        statusEl.className = 'error';
        return;
      }

      pages.forEach(page => {
        const block = document.createElement('div');
        block.className = 'page-block';

        const title = document.createElement('div');
        title.className = 'page-title';
        title.textContent = `Page ${page.number}${page.title ? ' — ' + page.title : ''}`;
        block.appendChild(title);

        const linesDiv = document.createElement('div');
        linesDiv.className = 'page-lines';
        page.lines.forEach(l => {
          const span = document.createElement('div');
          span.className = 'page-line';
          span.textContent = l;
          linesDiv.appendChild(span);
        });
        block.appendChild(linesDiv);
        outputArea.appendChild(block);
      });

      outputArea.className = 'visible';
      summary.innerHTML = `Found <span>${pages.length}</span> page${pages.length !== 1 ? 's' : ''} with text.`;
      outputPanel.style.display = 'flex';
      statusEl.textContent = 'Done! Your simplified script is ready below.';
      statusEl.className = 'info';
      outputPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function exportTxt() {
      const blocks = document.querySelectorAll('.page-block');
      if (!blocks.length) return;

      const lines = [];
      blocks.forEach(block => {
        lines.push(block.querySelector('.page-title').textContent);
        block.querySelectorAll('.page-line').forEach(l => lines.push(l.textContent));
        lines.push('');
      });

      const blob = new Blob([lines.join('\n').trimEnd()], { type: 'text/plain' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'simplified-script.txt'; a.click();
      URL.revokeObjectURL(url);
    }

    function clearAll() {
      document.getElementById('input-text').value = '';
      document.getElementById('status-msg').className = '';
      document.getElementById('status-msg').style.display = 'none';
      document.getElementById('output-panel').style.display = 'none';
      document.getElementById('output-area').innerHTML = '';
      document.getElementById('output-area').className = '';
    }
  </script>

</body>
</html>
